# Сборка образа и запуск: PostgreSQL, HashiCorp Vault (секреты БД), API модели.
services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 12

  vault:
    build:
      context: .
      dockerfile: Dockerfile.vault
    image: ${VAULT_IMAGE_NAME:-housing-vault:local}
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-housing-dev-root}
      VAULT_SEED_DB_USER: ${DB_USER}
      VAULT_SEED_DB_PASSWORD: ${DB_PASSWORD}
      VAULT_SEED_DB_NAME: ${DB_NAME}
      VAULT_SEED_DB_HOST: postgres
      VAULT_SEED_DB_PORT: "5432"
    ports:
      - "${VAULT_PORT:-8200}:8200"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "VAULT_ADDR=http://127.0.0.1:8200 VAULT_TOKEN=\"$$VAULT_DEV_ROOT_TOKEN_ID\" vault kv get secret/housing/db >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 20s

  housing-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKER_IMAGE_NAME:-ml-course-assignment:local}
    ports:
      - "${HOST_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
    environment:
      - MODEL_PATH=/app/models/model.joblib
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_TOKEN:-housing-dev-root}
      - VAULT_SECRET_PATH=secret/data/housing/db

volumes:
  postgres_data:
